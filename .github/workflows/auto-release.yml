name: Auto Generate Release

on:
  push:
    paths:
      - 'cardo.pac'
  workflow_dispatch:

jobs:
  generate-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Generate Release Name
        id: commit_count
        run: |
          today=$(TZ=Asia/Shanghai date +%Y%m%d)
          commit_count=$(TZ=Asia/Shanghai git log --date=local --since="$today 00:00:00" --until="$today 23:59:59" --pretty=format: --name-only | grep -c '^cardo.pac$')
          # Auto-increment if tag already exists (handles multiple merges on same day)
          n=$commit_count
          while git rev-parse "v${today}.${n}" >/dev/null 2>&1; do
            n=$((n + 1))
          done
          echo "RELEASE_NAME=v${today}.${n}" >> $GITHUB_ENV
          # Use multi-line env syntax to handle commit messages with newlines
          {
            echo "COMMIT_MESSAGE<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Create Tag
        id: create_tag
        run: |
          git tag "${{ env.RELEASE_NAME }}"
          git push origin ${{ env.RELEASE_NAME }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.RELEASE_NAME }}"
          name: "${{ env.RELEASE_NAME }}"
          body: "${{ env.COMMIT_MESSAGE }}"
          draft: false
          prerelease: false
          files: cardo.pac