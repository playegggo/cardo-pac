name: Auto Generate PAC File

on:
  schedule:
    - cron: '10 0 * * 4'
  push:
    paths:
      - 'cardo.py'
      - 'pac-template'
      - 'local-tlds.txt'
      - 'direct-domains.txt'
      - 'proxy-domains.txt'
      - 'cidrs-cn.txt'
  workflow_dispatch:

jobs:
  update-cardo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if cardo.pac is in the commit
        id: check-file
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q 'cardo\.pac'; then
            echo "file-exists=true" >> $GITHUB_ENV
          else
            echo "file-exists=false" >> $GITHUB_ENV
          fi

      - name: Download the latest cn.txt
        if: env.file-exists == 'false'
        run: curl -L https://raw.githubusercontent.com/Loyalsoldier/geoip/release/text/cn.txt -o cidrs-cn.txt

      - name: Run cardo.py script
        if: env.file-exists == 'false'
        run: ./cardo.py -f cardo.pac -p "SOCKS5 127.0.0.1:10808; PROXY 127.0.0.1:10808; DIRECT;" --proxy-domains=proxy-domains.txt --direct-domains=direct-domains.txt --localtld-domains=local-tlds.txt --ip-file=cidrs-cn.txt

      - name: Commit and push changes
        if: env.file-exists == 'false'
        run: |
          last_commit_message=$(git log -1 --pretty=%B | tr '\n' ' ')
          commit_message=$([[ "${{ github.event_name }}" == "schedule" ]] && echo "定期更新数据并生成 cardo.pac" || echo "自动生成 cardo.pac: $last_commit_message")
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "${commit_message}"
            git push
            echo "committed=true" >> $GITHUB_ENV
          else
            echo "committed=false" >> $GITHUB_ENV
          fi

      - name: Trigger Auto-Release
        if: env.file-exists == 'false' && env.committed == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Auto Generate Release
